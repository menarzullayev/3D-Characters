<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Test</title>
<style>
body { margin: 0; background: #111; color: white; font-family: sans-serif; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; padding: 10px; }
.card { background: #222; border-radius: 8px; overflow: hidden; }
h3 { text-align: center; padding: 8px; margin: 0; font-size: 13px; }
model-viewer { width: 100%; height: 280px; }
</style>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
</head>
<body>
<div class="grid">
  <div class="card">
    <h3>Spider-Man (WORKS)</h3>
    <model-viewer src="./assets/model/spiderman_rigged.glb?v=2" camera-controls auto-rotate scale="100 100 100"></model-viewer>
  </div>
  <div class="card">
    <h3>T-Rex</h3>
    <model-viewer src="./assets/model/rex_animation.glb?v=2" camera-controls auto-rotate camera-target="0m 0.6m 0m"></model-viewer>
  </div>
  <div class="card">
    <h3>Deer</h3>
    <model-viewer src="./assets/model/realistic_deer.glb?v=2" camera-controls auto-rotate camera-target="0m 0.7m 0m"></model-viewer>
  </div>
  <div class="card">
    <h3>Mini Drone</h3>
    <model-viewer src="./assets/model/mini_drone.glb?v=2" camera-controls auto-rotate></model-viewer>
  </div>
  <div class="card">
    <h3>Cow</h3>
    <model-viewer src="./assets/model/cow.glb?v=2" camera-controls auto-rotate camera-target="0m 0.5m 0m"></model-viewer>
  </div>
  <div class="card">
    <h3>Dancing Cow</h3>
    <model-viewer src="./assets/model/dancing_cow.glb?v=2" camera-controls auto-rotate camera-target="0m 0.5m 0m"></model-viewer>
  </div>
  <div class="card">
    <h3>Dancing Cow v1</h3>
    <model-viewer src="./assets/model/dancing_cow-v1.glb?v=2" camera-controls auto-rotate camera-target="0m 0.5m 0m"></model-viewer>
  </div>
</div>
</body>
</html>
