<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive 3D character viewer — animated models with auto-detected animations, dark glassmorphism UI.">
    <title>3D Characters — Interactive Viewer</title>
    <link rel="stylesheet" href="./assets/css/style.min.css">
</head>
<body>
    <a class="skip-link" href="#mainContent">Skip to content</a>

    <model-viewer
        id="model"
        src="./assets/model/spiderman_rigged.glb"
        alt="Interactive 3D character model"
        camera-controls
        touch-action="pan-y"
        interaction-prompt="auto"
        shadow-intensity="1.0"
        exposure="1.3"
        environment-image="neutral"
        camera-orbit="0deg 85deg 105%"
        camera-target="0m 0.9m 0m"
        min-camera-orbit="auto auto 50%"
        max-camera-orbit="auto auto 200%"
        autoplay
        animation-name="stand"
        loading="eager"
        reveal="auto"
        auto-rotate
        auto-rotate-delay="3000"
        rotation-per-second="8deg"
    ></model-viewer>

    <div id="loadingOverlay" class="overlay overlay--loading" aria-live="polite" aria-busy="true">
        <div class="overlay__card">
            <div class="spinner" role="status" aria-label="Loading model"></div>
            <p id="loadingText">Loading Spider-Man…</p>
        </div>
    </div>

    <div id="errorOverlay" class="overlay overlay--error hidden" aria-live="assertive">
        <div class="overlay__card">
            <p class="overlay__title">Model failed to load</p>
            <p class="overlay__text">Check your connection or try a different browser with WebGL enabled.</p>
            <button type="button" id="retryBtn" class="btn btn--primary">Retry</button>
        </div>
    </div>

    <div class="app-chrome" id="mainContent">
        <header class="dock dock--top" aria-label="Viewer controls">
            <div class="dock__brand">
                <a class="dock__author" href="https://github.com/menarzullayev" target="_blank" rel="noopener noreferrer">menarzullayev</a>
                <strong class="dock__title">3D Characters</strong>
            </div>

            <div class="anim-info" aria-label="Current animation">
                <button type="button" id="animPrev" class="anim-cycle-btn" aria-label="Previous animation" disabled>&#8592;</button>
                <span id="animName" class="anim-name">—</span>
                <span id="animCount" class="anim-count"></span>
                <button type="button" id="animNext" class="anim-cycle-btn" aria-label="Next animation" disabled>&#8594;</button>
            </div>

            <div class="dock__actions">
                <button type="button" id="playPauseBtn" class="btn btn--primary btn--icon" aria-label="Play animation" aria-pressed="true" disabled>
                    <svg class="icon-pause" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/></svg>
                    <svg class="icon-play"  width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <span class="btn__label">Pause</span>
                </button>
                <button type="button" id="autoRotateBtn" class="btn btn--icon" aria-pressed="true" aria-label="Auto-rotate on">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg>
                    <span class="btn__label">Rotate</span>
                </button>
                <button type="button" id="resetBtn" class="btn btn--icon" aria-label="Reset view">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 3 3 9 9 9"/></svg>
                    <span class="btn__label">Reset</span>
                </button>
                <button type="button" id="photoBtn" class="btn btn--icon" aria-label="Take photo">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    <span class="btn__label">Photo</span>
                </button>
            </div>
        </header>

        <nav class="dock dock--bottom" aria-label="Model selection">
            <p class="thumbs-label">Characters</p>
            <div id="thumbnails" class="thumbnails" role="listbox" aria-label="Select a 3D model"></div>
        </nav>
    </div>

    <div id="liveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer@latest/dist/model-viewer-legacy.js"></script>
    <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
